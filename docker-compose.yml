services:
  backend:
    build: .
    container_name: career-coach-backend
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: .
    container_name: career-coach-frontend
    command: streamlit run streamlit.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      # frontend reaches the backend by its service name, not localhost
      - BACKEND_URL=http://backend:8000
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
